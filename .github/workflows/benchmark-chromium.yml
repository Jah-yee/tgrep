name: Benchmark Chromium (Linux/macOS)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Benchmark Chromium (${{ matrix.os }})
    timeout-minutes: 180
    strategy:
      matrix:
        # ubuntu-latest excluded: 7 GB RAM is insufficient for indexing 440k+ files
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: cargo build --release

      - name: Run benchmark
        run: |
          chmod +x scripts/benchmark.sh
          ./scripts/benchmark.sh --queries scripts/benchmark-queries-chromium.json --skip-build --skip-rg --bench-dir /tmp/tgrep-bench --results benchmark-results.md

      - name: Print results
        run: cat benchmark-results.md

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-chromium-${{ matrix.os }}
          path: benchmark-results.md
